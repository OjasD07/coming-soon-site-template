<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon! - [Your Site Name]</title>
  <meta name="description" content="Website currently under construction." />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="google-site-verification" content="ADD_YOUR_GOOGLE_SEARCH_CONSOLE_TOKEN" />

  <meta property="og:title" content="Coming Soon! - [Your Site Name]" />
  <meta property="og:description" content="Website currently under construction." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Syne:wght@700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-1: #08110f;
      --bg-2: #10211c;
      --bg-3: #193127;
      --card: rgba(9, 19, 16, 0.72);
      --text-main: #f3f5ef;
      --text-muted: #c7d2ca;
      --accent-1: #f6c45f;
      --accent-2: #7fd4bf;
      --accent-3: #f7efe4;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      position: relative;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--text-main);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(246, 196, 95, 0.16), transparent 40%),
        radial-gradient(circle at 82% 8%, rgba(127, 212, 191, 0.18), transparent 38%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
    }

    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      filter: blur(28px);
      opacity: 0.6;
      mix-blend-mode: screen;
    }

    .blob-1 {
      width: min(48vw, 560px);
      height: min(48vw, 560px);
      top: -10%;
      left: -12%;
      background: radial-gradient(circle at 25% 25%, rgba(246, 196, 95, 0.7), rgba(246, 196, 95, 0));
      animation: float-1 12s ease-in-out infinite;
    }

    .blob-2 {
      width: min(50vw, 620px);
      height: min(50vw, 620px);
      right: -16%;
      bottom: -25%;
      background: radial-gradient(circle at 65% 30%, rgba(127, 212, 191, 0.68), rgba(127, 212, 191, 0));
      animation: float-2 14s ease-in-out infinite;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 25%, transparent 80%);
      opacity: 0.2;
      animation: grid-slide 18s linear infinite;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 760px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: clamp(1.5rem, 4vw, 3rem);
      text-align: center;
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow:
        0 16px 42px rgba(0, 0, 0, 0.38),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      animation: card-rise 900ms ease-out both;
    }

    h1 {
      margin: 0;
      line-height: 0.95;
      font-family: "Syne", sans-serif;
      font-size: clamp(2rem, 7vw, 5rem);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-3), var(--accent-2), var(--accent-1));
      background-size: 260% 260%;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 7s linear infinite;
      text-shadow: 0 4px 18px rgba(246, 196, 95, 0.16);
    }

    .tagline {
      margin: 1rem auto 0;
      max-width: 50ch;
      color: var(--text-muted);
      font-size: clamp(0.95rem, 2.3vw, 1.15rem);
      line-height: 1.6;
    }

    .links {
      margin-top: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.58rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .pill:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .copyright {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: rgba(215, 223, 218, 0.8);
      letter-spacing: 0.04em;
    }

    .courtesy {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 2;
      width: min(84vw, 190px);
      padding: 0.55rem 0.62rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      background: rgba(6, 14, 11, 0.78);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      color: var(--text-muted);
      font-size: 0.66rem;
      line-height: 1.22;
      text-align: left;
    }

    .courtesy__title {
      margin: 0 0 0.22rem;
      color: var(--text-main);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .courtesy__name {
      margin: 0 0 0.24rem;
      color: var(--accent-3);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .courtesy__links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.16rem 0.28rem;
    }

    .courtesy__links a {
      color: var(--text-muted);
      text-decoration: none;
      overflow-wrap: anywhere;
      font-size: 0.62rem;
    }

    .courtesy__links a:hover {
      color: #ffffff;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    @keyframes float-1 {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(12%, 8%, 0) scale(1.12); }
      100% { transform: translate3d(4%, -4%, 0) scale(0.96); }
    }

    @keyframes float-2 {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(-8%, -12%, 0) scale(1.08); }
      100% { transform: translate3d(6%, -2%, 0) scale(0.94); }
    }

    @keyframes grid-slide {
      0% { transform: translateY(0); }
      100% { transform: translateY(42px); }
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @keyframes card-rise {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 640px) {
      .card {
        border-radius: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <div class="grid"></div>
  </div>

  <main class="card">
    <h1>Work In Progress</h1>
    <p class="tagline">
      Coming Soon!
    </p>

    <div class="links">
      <a class="pill" href="mailto:[your-email]@gmail.com">Email</a>
      <a class="pill" href="[your-linkedin-profile]" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a class="pill" href="[your-github-profile]" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>

    <p class="copyright">&copy; <span id="year"></span>[Your Name]. All rights reserved.</p>
  </main>

  <aside class="courtesy" aria-label="Template courtesy">
    <p class="courtesy__title">Template Courtesy:</p>
    <p class="courtesy__name">Ojas Deshpande</p>
    <div class="courtesy__links">
      <a href="https://www.ojasdeshpande.in/" target="_blank" rel="noopener noreferrer">Portfolio</a>
      <a href="mailto:contact@ojasdeshpande.in">Mail</a>
      <a href="https://github.ojasdeshpande.in/" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="https://linkedin.ojasdeshpande.in/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
  </aside>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
